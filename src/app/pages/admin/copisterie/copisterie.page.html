<ion-content [fullscreen]="true">
  <ion-grid class="custom-table">

    <ion-row class="table-header">
      <ion-col size="2"><strong>ID</strong></ion-col>
      <ion-col size="2"><strong>Nickname</strong></ion-col>
      <ion-col size="2"><strong>Nome</strong></ion-col>
      <ion-col size="2"><strong>password_hash</strong></ion-col>
      <ion-col size="2"><strong>indirizzo</strong></ion-col>
      <ion-col size="2" class="ion-text-center"><strong>Azioni</strong></ion-col>
    </ion-row>

    <ion-row class="add-row" (click)="aggiungiNuova()">
      <ion-col size="12" class="ion-text-center">
        <ion-button fill="clear" color="success" class="add-button">
          <ion-icon slot="start" name="add-circle-outline"></ion-icon>
          Aggiungi Nuova Copisteria
        </ion-button>
      </ion-col>
    </ion-row>

    @for (copisteria of adminService.copisterie; track copisteria.copisteria_id) {
      <ion-row class="table-row">
        <ion-col size="2">{{ copisteria.copisteria_id}}</ion-col>
        <ion-col size="2">{{ copisteria.nickname}}</ion-col>
        <ion-col size="2">{{ copisteria.nome}}</ion-col>
        <ion-col size="2">{{ copisteria.password_hash}}</ion-col>
        <ion-col size="2">{{ copisteria.indirizzo}}</ion-col>

        <ion-col size="2" class="action-buttons ion-text-center">
          <ion-button fill="clear" color="primary" (click)="modifica(copisteria)">
            <ion-icon slot="icon-only" name="create-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="danger" (click)="elimina(copisteria)">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    }
  </ion-grid>
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">copisterie</ion-title>
    </ion-toolbar>
  </ion-header>
</ion-content>
