<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Gestione Orari Copisteria</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="table-actions">
    <span class="section-title">Fasce Orarie Ritiro</span>
    <ion-button class="btn-add" size="small" (click)="onAdd()">
      <ion-icon slot="start" name="time-outline"></ion-icon>
      Nuova Fascia
    </ion-button>
  </div>

  <ion-list lines="none" *ngIf="fasceOrarie.length > 0">
    <ion-item-sliding *ngFor="let fascia of fasceOrarie">
      
      <ion-item class="fascia-item">
        <ion-icon slot="start" name="calendar-outline" color="primary"></ion-icon>
        <ion-label>
          <h2>Disponibile per il ritiro</h2>
          <p>Dalle <strong>{{ fascia.inizio_fascia }}</strong> alle <strong>{{ fascia.fine_fascia }}</strong></p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="onDelete(fascia)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

  <div *ngIf="fasceOrarie.length === 0" class="no-data ion-text-center">
    <ion-icon name="hourglass-outline"></ion-icon>
    <p>Nessuna fascia oraria configurata al momento.</p>
  </div>

</ion-content>
