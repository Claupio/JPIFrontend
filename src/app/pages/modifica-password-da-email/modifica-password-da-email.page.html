<ion-content [fullscreen]="true" class="ion-padding colori-sfondo">
  <div class="center">
    <ion-card class="form-container">
      <ion-card-header class="ion-text-center">
        <img src ="./assets/icon/copisteria.png" class = "logo-header">
        <ion-card-title class="ion-text-left">Modifica password</ion-card-title>
      </ion-card-header>
      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
          <ion-input
            #passwordInput
            label="Password"
            label-placement="stacked"
            fill="outline"
            type="password"
            placeholder="Nuova Password"
            name="password"
            required [(ngModel)] = "password">

            <ion-icon
              slot="end"
              style="cursor: pointer; font-size: 1.5rem;"
              [name]="isPressed ? 'eye-outline' : 'eye-off-outline'"
              (mousedown)="showPassword(passwordInput)"
              (mouseup)="hidePassword(passwordInput)"
              (mouseleave)="hidePassword(passwordInput)"
              (touchstart)="showPassword(passwordInput)"
              (touchend)="hidePassword(passwordInput)">
            </ion-icon>
          </ion-input>

          <ion-button expand="block" class="login-button" type="submit">
            Modifica Password
          </ion-button>
        </form>
    </ion-card>
  </div>
</ion-content>
